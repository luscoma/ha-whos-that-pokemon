<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Who's That Pokémon? pokeball icon">
  <title>Who's That Pokémon?</title>
  <!-- Ball body -->
  <circle cx="128" cy="128" r="120" fill="#F5F5F5" stroke="#1a1a1a" stroke-width="10"/>
  <!-- Red top hemisphere -->
  <path d="M 8 128 A 120 120 0 0 1 248 128 Z" fill="#EE1515"/>
  <!-- Equatorial band -->
  <rect x="8" y="120" width="240" height="16" fill="#1a1a1a"/>
  <!-- Inner button -->
  <circle cx="128" cy="128" r="34" fill="#F5F5F5" stroke="#1a1a1a" stroke-width="10"/>
  <!-- Question mark -->
  <text x="128" y="146"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="46" font-weight="900" text-anchor="middle" fill="#1a1a1a">?</text>
</svg>
